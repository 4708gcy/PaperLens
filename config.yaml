app:
  name: "PaperLens"
  version: "1.0.0"
  host: "127.0.0.1"
  port: 8000
  debug: true

llm:
  api_key: ${DASHSCOPE_API_KEY}
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  # 主力模型（回答/解读/综述/学习辅导/图表理解）：qwen3.7-plus 支持文本+图片输入
  # 可用 model name 见百炼「选择模型」：https://help.aliyun.com/zh/model-studio/models
  model: "qwen3.7-plus"
  fast_model: "qwen-turbo"       # 快速模型（仅意图分类/大纲生成等辅助任务），省钱
  temperature: 0.7
  # 输出 token 上限：笔记/PPT/综述等长文任务需要较大空间，4096 会截断
  max_tokens: 8192
  # qwen3.7-plus 是混合思考模型：true 时先思考再答（质量高、但流式首 token 慢 ~45s）；
  # false 时直接回答（首 token ~1s）。默认开启以获得更好的回答质量。
  enable_thinking: true

embedding:
  # 本地路径（从 ModelScope 下载，PyTorch 格式）
  model: "E:/ai八斗学院学习/models/BAAI/bge-m3"
  dimension: 1024

reranker:
  # 本地路径（从 ModelScope 下载）
  model: "E:/ai八斗学院学习/models/BAAI/bge-reranker-v2-m3"

elasticsearch:
  hosts: ["http://localhost:9200"]
  index_prefix: "paperlens_paper"
  chunk_size: 512
  chunk_overlap: 64

rag:
  retrieval_top_k: 50
  rerank_top_k: 5
  rrf_k: 60
  rerank_candidates: 20

document:
  max_pdf_pages: 200
  upload_dir: "data/uploads"
  papers_dir: "data/papers"
  db_path: "data/paperlens.db"
  # 图片理解开关（二态，不再按数量截断——截断只会让前 N 张可能最不相关的描述混进来，质量更差）。
  # "on"  = 处理全部图片（论文/报告：架构图、实验图有价值，描述补进全文+ES）
  # "off" = 完全跳过图片理解（教材/数学书：公式截图描述无意义，省 30+ 分钟）
  # 该值是【默认】，前端上传时可覆盖。
  image_mode: "on"
